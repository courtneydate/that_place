name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install flake8 isort
      - name: flake8
        run: flake8 apps/ config/
        working-directory: backend
      - name: isort
        run: isort --check-only apps/ config/
        working-directory: backend

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: that_place_test
          POSTGRES_USER: that_place
          POSTGRES_PASSWORD: that_place
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://that_place:that_place@localhost:5432/that_place_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-jwt-secret
      FIELD_ENCRYPTION_KEY: pUGVWTlYu9EqyIaT7EjM4zUdA38mdLNPlpbu60uNKZU=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
        working-directory: backend
      - name: Run tests
        run: pytest --cov=apps/ -v
        working-directory: backend

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: ESLint
        run: npx eslint src/ --ext .js,.jsx
        working-directory: frontend

  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests
        run: npm test
        working-directory: frontend
