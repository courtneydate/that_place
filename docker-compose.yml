services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: that_place
      POSTGRES_USER: that_place
      POSTGRES_PASSWORD: that_place
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U that_place -d that_place']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  mosquitto:
    build: ./docker/mosquitto
    entrypoint: ['/mosquitto/config/entrypoint.sh']
    ports:
      - '1883:1883'   # username/password (legacy devices)
      - '8883:8883'   # mTLS (certificate-based devices)
    environment:
      MQTT_ADMIN_USERNAME: ${MQTT_ADMIN_USERNAME}
      MQTT_ADMIN_PASSWORD: ${MQTT_ADMIN_PASSWORD}
      # Subscriber credentials — entrypoint creates this client in dynsec
      # on every start so the Django MQTT subscriber can always connect.
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      # PKI — leave blank in dev; entrypoint auto-generates self-signed certs.
      # In production, provide base64-encoded PEM values generated offline.
      MQTT_CA_CERT_B64: ${MQTT_CA_CERT_B64:-}
      MQTT_CA_KEY_B64: ${MQTT_CA_KEY_B64:-}
      MQTT_BROKER_CERT_B64: ${MQTT_BROKER_CERT_B64:-}
      MQTT_BROKER_KEY_B64: ${MQTT_BROKER_KEY_B64:-}
    volumes:
      - ./docker/mosquitto:/mosquitto/config
      - mosquitto_certs:/mosquitto/certs
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log

  minio:
    image: minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
      minio:
        condition: service_started

  celery_worker:
    build: ./backend
    command: celery -A config.celery worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    build: ./backend
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  mqtt_subscriber:
    build: ./backend
    command: python manage.py start_mqtt
    volumes:
      - ./backend:/app
    env_file:
      - .env
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  mosquitto_certs:
  mosquitto_data:
  mosquitto_logs:
  minio_data:
