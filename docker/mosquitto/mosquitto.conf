# Security settings apply globally across all listeners.
per_listener_settings false
allow_anonymous false

# Dynamic Security plugin — manages credentials and per-device topic ACLs
# for all listeners. Config bootstrapped by entrypoint.sh on first start.
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/config/dynamic-security.json

# -----------------------------------------------------------------------
# Port 1883 — plaintext, username/password
# Used by: legacy v1 Scouts (fm/mm topics), devices without TLS support.
# Remove this listener once the legacy fleet is fully migrated.
# -----------------------------------------------------------------------
listener 1883

# -----------------------------------------------------------------------
# Port 8883 — TLS with mutual authentication (mTLS)
# Used by: new That Place v1 Scouts with provisioned certificates.
# The Scout presents its device certificate; Mosquitto verifies it against
# the CA. use_subject_as_username maps the cert CN to the dynamic security
# client entry for ACL enforcement.
# -----------------------------------------------------------------------
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/broker.crt
keyfile /mosquitto/certs/broker.key
require_certificate true
use_subject_as_username true

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type all
